apiVersion: batch/v1
kind: Job
metadata:
  name: rolling-forcing-tp4sp2
  namespace: default
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: rolling-forcing-tp4sp2
    spec:
      restartPolicy: Never
      nodeSelector:
        node-type: trn2
      resourceClaims:
        - name: m-trn2
          resourceClaimTemplateName: m-trn2
      containers:
        - name: inference
          image: 421672808698.dkr.ecr.us-east-1.amazonaws.com/concourse-release-0461d3b:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - "-exc"
            - |
              set -euxo pipefail

              cd /tmp
              git clone https://yahavb:${GITHUB_TOKEN}@github.com/yahavb/rolling_forcing.git
              cd rolling_forcing

              # ─── Install deps ─────────────────────────────────────────────
              uv pip install \
                "diffusers==0.37.1" \
                "transformers==5.8.1" \
                "huggingface-hub==1.16.4" \
                "click" \
                "einops==0.8.2" \
                "omegaconf==2.3.0" \
                "ftfy==6.3.1" \
                "regex==2026.5.9" \
                "av==17.0.1"

              # ─── Model weights: Wan2.1-T2V-1.3B (T5 + VAE) ─────────────
              WAN_TAR="/var/mdl/rolling_forcing/Wan2.1-T2V-1.3B.tar"
              WAN_LOCAL="/tmp/rolling_forcing/wan_models/Wan2.1-T2V-1.3B"

              if [[ -f "$WAN_TAR" ]]; then
                echo "Extracting Wan2.1-T2V-1.3B from S3 cache..."
                mkdir -p wan_models
                tar xf "$WAN_TAR" -C wan_models/
              else
                echo "Downloading Wan2.1-T2V-1.3B from HuggingFace..."
                python3 -c "
              from huggingface_hub import snapshot_download
              snapshot_download('Wan-AI/Wan2.1-T2V-1.3B', local_dir='wan_models/Wan2.1-T2V-1.3B', local_dir_use_symlinks=False)
              "
                echo "Creating tar for S3 cache..."
                tar cf /tmp/Wan2.1-T2V-1.3B.tar -C wan_models Wan2.1-T2V-1.3B
                mkdir -p "$(dirname $WAN_TAR)"
                cp /tmp/Wan2.1-T2V-1.3B.tar "$WAN_TAR"
                rm -f /tmp/Wan2.1-T2V-1.3B.tar
                echo "Cached Wan2.1-T2V-1.3B to S3!"
              fi

              # ─── Model weights: Rolling-forcing DMD checkpoint ──────────
              DMD_TAR="/var/mdl/rolling_forcing/rolling_forcing_dmd.tar"

              if [[ -f "$DMD_TAR" ]]; then
                echo "Extracting DMD checkpoint from S3 cache..."
                mkdir -p checkpoints
                tar xf "$DMD_TAR" -C checkpoints/
              else
                echo "Downloading DMD checkpoint from HuggingFace..."
                python3 -c "
              from huggingface_hub import snapshot_download
              snapshot_download('TencentARC/RollingForcing', allow_patterns='checkpoints/rolling_forcing_dmd.pt', local_dir='.', local_dir_use_symlinks=False)
              "
                echo "Creating tar for S3 cache..."
                tar cf /tmp/rolling_forcing_dmd.tar -C checkpoints rolling_forcing_dmd.pt
                mkdir -p "$(dirname $DMD_TAR)"
                cp /tmp/rolling_forcing_dmd.tar "$DMD_TAR"
                rm -f /tmp/rolling_forcing_dmd.tar
                echo "Cached DMD checkpoint to S3!"
              fi

              echo "Model weights ready."

              # ─── Native PyTorch Neuron profiler (captures NEFF+NTFF pairs) ────
              export NEURON_PROFILE_ENABLE=1
              export NEURON_PROFILE_DIR=/tmp/neuron_profile

              # ─── Launch e2e pipeline (TP=4 x SP=2 = 8 ranks) ───────────
              echo "============================================"
              echo "  Rolling Forcing: TP=4 SP=2"
              echo "  Native Neuron Profiler + TFLOPS/MFU"
              echo "============================================"

              PROFILE_E2E_PIPELINE=1 MEASURE_TFLOPS=1 \
                torchrun --nproc_per_node 8 e2e_pipeline.py \
                --prompt_file prompts/example_prompts.txt \
                --output_folder videos_pipeline \
                --config_path configs/rolling_forcing_dmd.yaml \
                --checkpoint_path checkpoints/rolling_forcing_dmd.pt \
                --tp_degree 4 \
                --num_output_frames 21 \
                --chunk-size 3 \
                --fps 16 \
                --use_ema 2>&1 || true

              # ─── Neuron Explorer: analyze traces ───────────────────────
              PROFILE_DEST="/tmp/neuron_profile"
              if [[ -d "$PROFILE_DEST" && -n "$(ls -A $PROFILE_DEST 2>/dev/null)" ]]; then
                echo ""
                echo "============================================"
                echo "  NEURON EXPLORER ANALYSIS"
                echo "============================================"

                # Copy NEFFs into session dirs so explorer can match NEFF+NTFF pairs
                if [[ -d "$PROFILE_DEST/neffs" ]]; then
                  for session_dir in $(find "$PROFILE_DEST" -name "*.ntff" -printf '%h\n' 2>/dev/null | sort -u); do
                    cp "$PROFILE_DEST/neffs/"*.neff "$session_dir/" 2>/dev/null || true
                  done
                  echo "Copied NEFFs into session directories"
                fi

                NTFF_DIR=$(find "$PROFILE_DEST" -name "*.ntff" -printf '%h\n' 2>/dev/null | head -1)

                echo "=== neuron-explorer view (summary-text) ==="
                neuron-explorer view -d "$NTFF_DIR" \
                  --output-format summary-text \
                  2>&1 | tee /tmp/neuron_explorer_summary.txt || true

                echo ""
                echo "=== neuron-explorer view (JSON) ==="
                neuron-explorer view -d "$NTFF_DIR" \
                  --output-format json \
                  --output-file /tmp/neuron_explorer_profile.json \
                  2>&1 | tee /tmp/neuron_explorer_view.log || true

                echo ""
                echo "=== NEFF COUNT AND SIZE DISTRIBUTION ==="
                NEFF_COUNT=$(find "$NTFF_DIR" -name '*.neff' | wc -l)
                echo "Total NEFFs: $NEFF_COUNT"
                find "$NTFF_DIR" -name '*.neff' -exec ls -l '{}' ';' | awk '{print $5}' | sort -n | awk '
                  BEGIN { count=0; sum=0 }
                  { sizes[count++]=$1; sum+=$1 }
                  END {
                    if (count == 0) { print "No NEFFs found"; exit }
                    printf "Total size: %.2f MB\n", sum/1024/1024
                    printf "Min: %d bytes\n", sizes[0]
                    printf "Max: %d bytes (%.2f MB)\n", sizes[count-1], sizes[count-1]/1024/1024
                    printf "Median: %d bytes\n", sizes[int(count/2)]
                    printf "Mean: %.0f bytes\n", sum/count
                    printf "\nSize buckets:\n"
                    small=0; med=0; large=0; xlarge=0
                    for(i=0;i<count;i++) {
                      if(sizes[i]<10000) small++
                      else if(sizes[i]<100000) med++
                      else if(sizes[i]<1000000) large++
                      else xlarge++
                    }
                    printf "  <10KB  (tiny):   %d\n", small
                    printf "  10-100KB (small): %d\n", med
                    printf "  100KB-1MB (med):  %d\n", large
                    printf "  >1MB  (large):    %d\n", xlarge
                  }'
              else
                echo "WARNING: No profile directory found for neuron-explorer"
              fi

              # ─── Archive to S3 ────────────────────────────────────────
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              ARCHIVE_DIR="/var/mdl/rolling_forcing/runs/${TIMESTAMP}"
              echo ""
              echo "============================================"
              echo "  ARCHIVING to S3: $ARCHIVE_DIR"
              echo "============================================"
              mkdir -p "$ARCHIVE_DIR"
              if [[ -d videos_pipeline ]]; then
                cp videos_pipeline/*.mp4 "$ARCHIVE_DIR/" 2>/dev/null || true
                cp videos_pipeline/tflops_report.json "$ARCHIVE_DIR/" 2>/dev/null || true
              fi
              cp /tmp/neuron_explorer_summary.txt "$ARCHIVE_DIR/" 2>/dev/null || true
              cp /tmp/neuron_explorer_profile.json "$ARCHIVE_DIR/" 2>/dev/null || true
              cp /tmp/neuron_explorer_view.log "$ARCHIVE_DIR/" 2>/dev/null || true
              cp -r "$PROFILE_DEST" "$ARCHIVE_DIR/profiles" 2>/dev/null || true
              echo "Archive complete!"
              ls -la "$ARCHIVE_DIR/" 2>/dev/null || true

              echo "═══════════════════════════════════════════"
              echo "  Done! Rolling Forcing profiling complete"
              echo "═══════════════════════════════════════════"
          resources:
            claims:
              - name: m-trn2
            requests:
              cpu: 24
              memory: 256Gi
            limits:
              cpu: 24
              memory: 256Gi
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: 621547421844-ap-southeast-4-pvc
              mountPath: /var/mdl
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NEURON_RT_LOG_LEVEL
              value: "ERROR"
            - name: NEURON_CC_LOG_LEVEL
              value: "ERROR"
            - name: TORCH_NEURONX_LOG_LEVEL
              value: "ERROR"
            - name: NEURON_RT_DBG_INTRA_RDH_CHANNEL_BUFFER_SIZE
              value: "134217728"
            - name: NEURON_CC_FLAGS
              value: "--model-type=transformer"
            - name: NEURON_FALLBACK_ENABLED
              value: "0"
            - name: NEURON_RT_ASYNC_EXEC_MAX_INFLIGHT_REQUESTS
              value: "0"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: GITHUB_TOKEN
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
        - name: 621547421844-ap-southeast-4-pvc
          persistentVolumeClaim:
            claimName: 621547421844-ap-southeast-4-pvc
