generator_ckpt: checkpoints/ode_init.pt
generator_fsdp_wrap_strategy: size
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
real_name: Wan2.1-T2V-14B
text_encoder_fsdp_wrap_strategy: size
denoising_step_list:
- 1000
- 800
- 600
- 400
- 200
warp_denoising_step: true # need to remove - 0 in denoising_step_list if warp_denoising_step is true
ts_schedule: false
# frame_seq_length = (latent_h/2) * (latent_w/2) patched tokens per frame (runtime uses h*w).
# TP4xSP4 (16 ranks) requires every sharded token-run (F * frame_seq_length) divisible by 16.
# 1560 (=30*52, from latent 60x104 / 480x832) is div by 8 but NOT 16 -> SP4 asserts fail.
# 1680 (=30*56, 480x896) IS div by 16 but OOMs HBM (bigger KV cache than the known-good 832).
# 1440 (=30*48, 480x768) is div by 16 but STILL OOM'd HBM by 120MB/rank (KV cache =
# num_layers*2*24*fs*heads_per_rank*head_dim is TP-sharded only; SP/more cores can't help).
# 1200 (=30*40, from latent 60x80 / 480x640) is div by 16 (=16*75) and frees ~253MB/rank
# vs 1440 -> clears the 120MB overshoot with margin. MUST run with --latent_w 80.
frame_seq_length: 1200
num_train_timestep: 1000
timestep_shift: 5.0
guidance_scale: 3.0
denoising_loss_type: flow
mixed_precision: true
seed: 0
sharding_strategy: hybrid_full
lr: 1.5e-06
lr_critic: 4.0e-07
beta1: 0.0
beta2: 0.999
beta1_critic: 0.0
beta2_critic: 0.999
data_path: prompts/vidprom_filtered_extended.txt
batch_size: 1
ema_weight: 0.99
ema_start_step: 200
total_batch_size: 64
log_iters: 100
negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'
dfake_gen_update_ratio: 5
image_or_video_shape:
- 1
- 21
- 16
- 60
- 104
distribution_loss: dmd
trainer: score_distillation
gradient_checkpointing: true
num_frame_per_block: 7
load_raw_video: false
model_kwargs:
  timestep_shift: 5.0