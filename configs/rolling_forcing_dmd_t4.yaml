# T=4 DMD distillation config for Rolling Forcing (faster inference student).
#
# This is a TRAINING config (mirrors upstream ~/RollingForcing/configs/rolling_forcing_dmd.yaml)
# with ONE substantive change vs the shipped T=5 recipe: a 4-entry denoising_step_list.
#
# WHY: inference cost per rolling window scales with (T+1) merged frames
# (dit_pipeline.py: full_frames = (T+1)*num_frame_per_block). Dropping T 5->4 cuts the
# DiT work per block ~18->15 frames (~0.83x) -> projects ~14 fps -> ~16-17 fps.
# You CANNOT just truncate the shipped T=5 checkpoint at inference: the student only
# predicts accurate x0 at the noise levels it was distilled on. Fewer steps => re-distill.
#
# denoising_step_list: 4 evenly-spaced levels. warp_denoising_step: true => NO trailing 0
# (the config comment upstream: "need to remove - 0 ... if warp_denoising_step is true").
denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true

# ── everything below is IDENTICAL to the proven T=5 upstream training recipe ──
generator_ckpt: checkpoints/ode_init.pt          # Self-Forcing ODE-init (gdhe17/Self-Forcing)
# PER-BLOCK FSDP wrap (SD's fix for the 5.287GB whole-model all-gather OOM). "size"
# wrap (min 5e7 params) leaves each Wan block < threshold -> FSDP wraps the whole 1.3B
# net as ONE unit and all-gathers all 5.287GB fp32 in a single spike to run forward.
# "transformer" wrap shards PER CausalWanAttentionBlock/WanAttentionBlock, so only one
# block is gathered at a time (SD: `for blk in m.blocks: fully_shard(blk)`). See
# distillation.py where transformer_module is passed.
generator_fsdp_wrap_strategy: transformer
real_score_fsdp_wrap_strategy: transformer
fake_score_fsdp_wrap_strategy: transformer
real_name: Wan2.1-T2V-14B                         # teacher = BASE multi-step bidirectional 14B
                                                  # (NOT a distilled few-step ckpt — that was SD bug B)
text_encoder_fsdp_wrap_strategy: size
ts_schedule: false
num_train_timestep: 1000
timestep_shift: 5.0
guidance_scale: 3.0                               # real-score CFG
denoising_loss_type: flow
mixed_precision: true
seed: 0
sharding_strategy: full   # FULL_SHARD across all 16 cores (÷16) vs hybrid_full's ÷8.
                          # Saves ~params, but the NRT dump proved params are NOT the
                          # bulk (full moved it only 22->20GB): the 20GB "Tensors" is
                          # KV caches + rollout/scoring ACTIVATIONS. The real fix is the
                          # resolution cut (frame_seq 1560->1200) below + derived KV
                          # cache in the pipeline. Kept full since it's strictly ≤ mem.
lr: 1.5e-06                                        # generator lr
lr_critic: 4.0e-07                                 # critic lr (lower)
beta1: 0.0
beta2: 0.999
beta1_critic: 0.0
beta2_critic: 0.999
data_path: prompts/distill_poc_single.txt         # PROOF-OF-CONCEPT: single prompt (example 000,
                                                  # the western/horse shot). Data-free DMD; a student
                                                  # specialized to ONE prompt tolerates fewer steps
                                                  # best. Compare its T=4 render against the existing
                                                  # T=5 baseline rf_sp4_videos/prompt_000.mp4.
                                                  # Swap to prompts/example_prompts.txt (15) or
                                                  # vidprom_filtered_extended.txt for a broader model.
batch_size: 1
# EMA DISABLED to match StreamDiffusionV2's proven-stable Neuron distill (branch
# exp/fps-1.3b, 1000s of iters, no OOM): SD's trainer has NO EMA at all. Reason,
# straight from SD's code: EMA_FSDP updates via FSDP.summon_full_params, which
# all-gathers the FULL fp32 params onto EVERY rank's HBM (a 5.287GB on-device spike
# for the 1.3B student) — every generator step once ema_start_step is reached, plus
# once at build. SD's rule is that the full unsharded fp32 model NEVER co-resides
# on-device; its ONLY full-param gather (checkpoint save) uses cpu_offload=True so it
# lands on CPU, not HBM. EMA's summon violates that rule, so SD removed EMA entirely.
# ema_weight=0 disables both summon sites (build + per-step update) here. EMA is a
# quality nicety, not required for the DMD loop.
ema_weight: 0.0
ema_start_step: 200
total_batch_size: 64
log_iters: 100
negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'
dfake_gen_update_ratio: 5                          # generator updated once per 5 critic steps
# Train at the resolution we DEPLOY (480x640, latent 60x80) — NOT the upstream
# 480x832 (60x104). This (a) distills for the res we actually serve, and (b) cuts
# per-model KV cache 7.76GB -> 5.97GB and all rollout/scoring activations ~23%
# (frame_seq 1560 -> 1200). SD did the same (commit 02fa0bf: lower-res training =
# "55% less activation"). latent_w 80 matches rf-deploy.yaml LATENT_W=80.
image_or_video_shape:
- 1
- 21
- 16
- 60
- 80
distribution_loss: dmd
trainer: score_distillation
gradient_checkpointing: true
num_frame_per_block: 3                             # independent of T; keep at 3
# DMD is pure latent-space (teacher/critic score latents, loss on latents) — the VAE is
# NOT needed. It was only pulled onto the device by base.py:156, the rollout branch that
# fires when >21 frames are generated (re-encode frame 0 to an image latent). Pinning
# num_training_frames 27->21 makes the rollout ALWAYS produce exactly 21 frames, so that
# branch never runs, gradient_mask is None, and the VAE is dead code. Also shrinks
# num_max_frames 27->21: KV cache 5.97->4.64GB/model + rollout/scoring activations ~22%.
# This is the SD lever (02fa0bf: fewer frames = less activation) that clears the iter-0 OOM.
num_training_frames: 21
load_raw_video: false
model_kwargs:
  timestep_shift: 5.0
