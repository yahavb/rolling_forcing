apiVersion: v1
kind: Service
metadata:
  name: rf
  namespace: default
spec:
  selector:
    app: rf
  ports:
    - port: 8000
      targetPort: 8000
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rf
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rf
  template:
    metadata:
      labels:
        app: rf
    spec:
      nodeSelector:
        node-type: trn2
      resourceClaims:
        # 16 NeuronCores (2 chips x 8, LNC=1) for TP4xSP4. Benchmarked at 13.19 fps
        # vs 8.75 fps at TP4xSP2 (8 cores) — 1.51x. See rf-job.yaml.
        - name: m-lnc1-trn2
          resourceClaimTemplateName: m-lnc1-trn2
      containers:
        - name: app
          image: 421672808698.dkr.ecr.us-east-1.amazonaws.com/concourse-release-0461d3b:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - "-exc"
            - |
              set -euxo pipefail

              cd /tmp
              # TP4xSP4 lives on this branch: frame_seq_length=1200 + SP4 divisibility
              # guard in dit_pipeline.py. main does NOT have them yet.
              git clone -b "${BRANCH:-tp4-sp4-16core}" https://yahavb:${GITHUB_TOKEN}@github.com/yahavb/rolling_forcing.git
              cd rolling_forcing

              # ─── Install deps ─────────────────────────────────────────────
              uv pip install \
                "diffusers==0.37.1" \
                "transformers==5.8.1" \
                "huggingface-hub==1.16.4" \
                "click" \
                "einops==0.8.2" \
                "omegaconf==2.3.0" \
                "ftfy==6.3.1" \
                "regex==2026.5.9" \
                "av==17.0.1" \
                "fastapi" \
                "uvicorn[standard]" \
                "pillow"

              # ─── Model weights: Wan2.1-T2V-1.3B (T5 + VAE) ─────────────
              WAN_TAR="/var/mdl/rolling_forcing/Wan2.1-T2V-1.3B.tar"

              if [[ -f "$WAN_TAR" ]]; then
                echo "Extracting Wan2.1-T2V-1.3B from S3 cache..."
                mkdir -p wan_models
                tar xf "$WAN_TAR" -C wan_models/
              else
                echo "Downloading Wan2.1-T2V-1.3B from HuggingFace..."
                python3 -c "
              from huggingface_hub import snapshot_download
              snapshot_download('Wan-AI/Wan2.1-T2V-1.3B', local_dir='wan_models/Wan2.1-T2V-1.3B', local_dir_use_symlinks=False)
              "
                echo "Creating tar for S3 cache..."
                tar cf /tmp/Wan2.1-T2V-1.3B.tar -C wan_models Wan2.1-T2V-1.3B
                mkdir -p "$(dirname $WAN_TAR)"
                cp /tmp/Wan2.1-T2V-1.3B.tar "$WAN_TAR"
                rm -f /tmp/Wan2.1-T2V-1.3B.tar
              fi

              # ─── Model weights: Rolling-forcing DMD checkpoint ──────────
              DMD_TAR="/var/mdl/rolling_forcing/rolling_forcing_dmd.tar"

              if [[ -f "$DMD_TAR" ]]; then
                echo "Extracting DMD checkpoint from S3 cache..."
                mkdir -p checkpoints
                tar xf "$DMD_TAR" -C checkpoints/
              else
                echo "Downloading DMD checkpoint from HuggingFace..."
                python3 -c "
              from huggingface_hub import snapshot_download
              snapshot_download('TencentARC/RollingForcing', allow_patterns='checkpoints/rolling_forcing_dmd.pt', local_dir='.', local_dir_use_symlinks=False)
              "
                echo "Creating tar for S3 cache..."
                tar cf /tmp/rolling_forcing_dmd.tar -C checkpoints rolling_forcing_dmd.pt
                mkdir -p "$(dirname $DMD_TAR)"
                cp /tmp/rolling_forcing_dmd.tar "$DMD_TAR"
                rm -f /tmp/rolling_forcing_dmd.tar
              fi

              echo "Model weights ready."

              # ─── Launch serve.py (TP=4 x SP=4 = 16 ranks) ──────────────
              echo "============================================"
              echo "  Rolling Forcing Serving: TP=4 SP=4 (16 cores)"
              echo "  480x640 / frame_seqlen 1200 — benchmarked 13.19 fps"
              echo "============================================"

              torchrun --nproc_per_node 16 serve.py
          resources:
            claims:
              - name: m-lnc1-trn2
            requests:
              cpu: 24
              memory: 64Gi
            limits:
              cpu: 24
              memory: 64Gi
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: 621547421844-ap-southeast-4-pvc
              mountPath: /var/mdl
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NEURON_RT_LOG_LEVEL
              value: "ERROR"
            - name: NEURON_CC_LOG_LEVEL
              value: "ERROR"
            - name: TORCH_NEURONX_LOG_LEVEL
              value: "ERROR"
            - name: NEURON_RT_DBG_INTRA_RDH_CHANNEL_BUFFER_SIZE
              value: "134217728"
            - name: NEURON_CC_FLAGS
              value: "--model-type=transformer"
            - name: NEURON_FALLBACK_ENABLED
              value: "0"
            - name: NEURON_RT_ASYNC_EXEC_MAX_INFLIGHT_REQUESTS
              value: "0"
            - name: TP_DEGREE
              value: "4"
            - name: DEFAULT_NUM_FRAMES
              value: "21"
            - name: DEFAULT_FPS
              value: "16"
            # frame_seq_length: 1200 lives here (480x640, div-by-16 for SP4)
            - name: CONFIG_PATH
              value: "configs/rolling_forcing_dmd.yaml"
            - name: CHECKPOINT_PATH
              value: "checkpoints/rolling_forcing_dmd.pt"
            - name: WARMUP_FRAMES
              value: "21"
            # 480x640: latent_w=80 is div-by-16 (VAE width-shard) AND fits HBM.
            # (72 would break SP4: 72%16=8; higher res OOM'd — see rf-job.yaml.)
            - name: LATENT_H
              value: "60"
            - name: LATENT_W
              value: "80"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: GITHUB_TOKEN
          ports:
            - containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 100
            failureThreshold: 475
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 600
            periodSeconds: 300
            successThreshold: 1
            failureThreshold: 1000
            timeoutSeconds: 60
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 24Gi
        - name: 621547421844-ap-southeast-4-pvc
          persistentVolumeClaim:
            claimName: 621547421844-ap-southeast-4-pvc
