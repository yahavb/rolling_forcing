apiVersion: batch/v1
kind: Job
metadata:
  name: rolling-forcing
  namespace: default
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: rf-job
    spec:
      restartPolicy: Never
      nodeSelector:
        node-type: trn3
      resourceClaims:
        - name: m-lnc1-trn3
          resourceClaimTemplateName: m-lnc1-trn3
      containers:
        - name: inference
          #image: 421672808698.dkr.ecr.us-east-1.amazonaws.com/concourse-release-0461d3b:latest
          image: 621547421844.dkr.ecr.us-west-2.amazonaws.com/native-pytorch:2.11.0-neuronx-py312-sdk2.31.0-ubuntu24.04-neurondlcbuilder-development-6486001458-0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - "-exc"
            - |
              set -euxo pipefail

              # Clone rolling_forcing (NOT aws-reactor). Branch rf-meta-bf16-fix = main +
              # the two SDK/trn3 fixes (load_state_dict assign=True + generator bf16 cast).
              git clone -b rf-meta-bf16-fix https://yahavb:${GITHUB_TOKEN}@github.com/yahavb/rolling_forcing.git
              cd rolling_forcing

              # ── PROVENANCE: which code ran (branch/commit/subject) — right after clone ──
              GIT_SHA=$(git rev-parse HEAD); GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
              echo "┌── PROVENANCE ──"
              echo "│ branch : $GIT_BRANCH (requested: rf-meta-bf16-fix)"
              echo "│ commit : $GIT_SHA"
              echo "│ subject: $(git log -1 --pretty=%s)"
              echo "└────────────────"

              export RF_DEVICE_BACKEND=neuron

              # This DLC image does not auto-activate a venv, so `uv pip install` errors
              # with "No virtual environment found". Target the SAME interpreter python3
              # uses (where torch-neuronx already lives) via --python.
              UVPY="$(command -v python3)"
              echo "uv target interpreter: $UVPY"

              # Install dependencies — EXACT pinned set from rolling_forcing rf-job.yaml (main).
              # requirements.txt pulled diffusers==0.31.0, which raises "missing keys" on
              # from_pretrained when the model compiles submodules (_orig_mod). The reference's
              # diffusers==0.37.1 tolerates it. Match the reference deps exactly.
              uv pip install --python "$UVPY" \
                "diffusers==0.37.1" \
                "transformers==5.8.1" \
                "huggingface-hub==1.16.4" \
                "click" \
                "einops==0.8.2" \
                "omegaconf==2.3.0" \
                "ftfy==6.3.1" \
                "regex==2026.5.9" \
                "av==17.0.1"
              uv pip install --python "$UVPY" "setuptools<81"
              uv pip install --python "$UVPY" git+https://github.com/pytorch/vision.git@v0.25.0 --no-deps --no-cache --no-build-isolation

              # /var/mdl is S3-backed. Use single tar file to avoid per-file S3 overhead
              WAN_1_3B_TAR="/var/mdl/wan_models/Wan2.1-T2V-1.3B.tar"

              # Copy Wan 1.3B model as single tar from S3 cache to local disk
              mkdir -p wan_models
              if [[ -f "$WAN_1_3B_TAR" ]]; then
                echo "Copying Wan 1.3B tar from S3 cache..."
                cp "$WAN_1_3B_TAR" /tmp/Wan2.1-T2V-1.3B.tar
                echo "Extracting..."
                tar xf /tmp/Wan2.1-T2V-1.3B.tar -C wan_models/
                rm -f /tmp/Wan2.1-T2V-1.3B.tar
                echo "Done!"
              else
                echo "Downloading Wan 1.3B model from HuggingFace to local disk..."
                python3 -c "from huggingface_hub import snapshot_download; snapshot_download('Wan-AI/Wan2.1-T2V-1.3B', local_dir='wan_models/Wan2.1-T2V-1.3B', local_dir_use_symlinks=False)"
                echo "Creating tar archive for S3 cache (avoids per-file overhead next time)..."
                tar cf /tmp/Wan2.1-T2V-1.3B.tar -C wan_models Wan2.1-T2V-1.3B
                mkdir -p "$(dirname $WAN_1_3B_TAR)"
                cp /tmp/Wan2.1-T2V-1.3B.tar "$WAN_1_3B_TAR"
                rm -f /tmp/Wan2.1-T2V-1.3B.tar
                echo "Cached tar to S3!"
              fi

              echo "Model weights ready!"

              # Copy RollingForcing DMD checkpoint from S3 cache to local disk
              RF_CACHE="/var/mdl/checkpoints/rolling_forcing_dmd.pt"
              mkdir -p checkpoints
              if [[ -f "$RF_CACHE" ]]; then
                echo "Copying RollingForcing checkpoint from S3 cache to local disk..."
                cp "$RF_CACHE" checkpoints/rolling_forcing_dmd.pt
                echo "Copy complete!"
              else
                echo "Downloading RollingForcing checkpoint from HuggingFace to local disk..."
                python3 -c "from huggingface_hub import hf_hub_download; hf_hub_download('TencentARC/RollingForcing', 'checkpoints/rolling_forcing_dmd.pt', local_dir='.')"
                echo "Caching to S3 for next time..."
                mkdir -p "$(dirname $RF_CACHE)"
                cp checkpoints/rolling_forcing_dmd.pt "$RF_CACHE"
              fi

              export REPO_DIR=$(pwd)

              # Native PyTorch Neuron profiler (post-warmup only, captures NEFF+NTFF pairs)
              # profiler DISABLED for sweep (clean fps timing): export NEURON_PROFILE_ENABLE=1
              # profiler DISABLED for sweep (clean fps timing): export NEURON_PROFILE_DIR=/tmp/neuron_profile

              # Launch e2e_pipeline.py (T5->DiT->VAE fused) — the rolling_forcing ~14fps
              # reference entrypoint. PROFILE_E2E_PIPELINE=1 -> per-block "DiT/VAE/fps" +
              # "T5:" lines; MEASURE_TFLOPS=1 -> per-prompt "[DiT+VAE (prompt N)] TFLOPS MFU"
              # + tflops_report.json. Steady-state VAE/DiT timers exclude postprocess+gather
              export PROFILE_E2E_PIPELINE=1
              export MEASURE_TFLOPS=1
              # Match the working 14-15fps reference recipe: ring/context-parallel attention
              # ON with NSEG=1 (single-segment ring path). RF_RING_NSEG=1 is the fast path —
              # one plain wan_flash_self_attn call, no cross-shard combine (models/
              # dit_attention.py _attend_ring). This is the ONLY env difference vs the
              # rolling_forcing rf-rope-qk-fuse-1200-mlnc1 job that measured ~14-15fps.
              export RF_RING=1
              export RF_RING_NSEG=1
              E2E_OUT=/tmp/rf_run_$(date +%Y%m%d_%H%M%S)
              mkdir -p "$E2E_OUT"
              RUN_LOG=/tmp/e2e_run.log
              torchrun --nproc_per_node=16 --master_port=29500 \
                e2e_pipeline.py \
                --prompt_file prompts/example_prompts.txt \
                --config_path "${CONFIG_PATH}" \
                --checkpoint_path "${CHECKPOINT_PATH}" \
                --tp_degree "${TP_DEGREE}" \
                --latent_w "${LATENT_W}" \
                --latent_h 60 \
                --num_output_frames "${DEFAULT_NUM_FRAMES}" \
                --chunk-size 3 \
                --fps "${DEFAULT_FPS}" \
                --output_folder "$E2E_OUT" \
                --use_ema 2>&1 | tee "$RUN_LOG" || true

              # ========================================
              # FPS SUMMARY — DiT-only AND DiT+VAE (median + max), steady-state
              # Parses per-block "block N: DiT X ms  VAE Y ms  F frames" lines.
              #   DiT-only  fps = frames * 1000 / DiT_ms
              #   DiT+VAE   fps = frames * 1000 / (DiT_ms + VAE_ms)
              # Excludes block 0 of every prompt (cold compile/load outlier). Reports
              # median (typical) and max (best steady-state, matches reference headline).
              # ========================================
              echo ""
              echo "════════════ FPS SUMMARY (fs=${CONFIG_PATH##*_} latent_w=${LATENT_W}, claim from job) ════════════"
              awk '
                /block +[0-9]+: *DiT/ {
                  # fields: ... block N: DiT X ms VAE Y ms F frames ...
                  for (i=1;i<=NF;i++){
                    if ($i=="block"){ blk=$(i+1); sub(":","",blk) }
                    if ($i=="DiT"){ dit=$(i+1) }
                    if ($i=="VAE"){ vae=$(i+1) }
                    if ($i=="frames"){ fr=$(i-1) }
                  }
                  if (blk+0>0 && dit+0>0){
                    d[nd++]=fr*1000.0/dit
                    if (vae+0>0) dv[ndv++]=fr*1000.0/(dit+vae)
                  }
                }
                function med(arr,n,  i,j,t){
                  for(i=0;i<n;i++)for(j=i+1;j<n;j++)if(arr[j]<arr[i]){t=arr[i];arr[i]=arr[j];arr[j]=t}
                  return (n%2)?arr[int(n/2)]:(arr[n/2-1]+arr[n/2])/2
                }
                function mx(arr,n,  i,m){ m=0; for(i=0;i<n;i++)if(arr[i]>m)m=arr[i]; return m }
                END{
                  if(nd==0){ print "  no per-block DiT lines found"; exit }
                  printf "  DiT-only : median %6.2f fps | max %6.2f fps   (over %d blocks)\n", med(d,nd), mx(d,nd), nd
                  if(ndv>0) printf "  DiT+VAE  : median %6.2f fps | max %6.2f fps   (over %d blocks)\n", med(dv,ndv), mx(dv,ndv), ndv
                  else      print  "  DiT+VAE  : (no VAE timing lines)"
                }' "$RUN_LOG" | tee /tmp/fps_summary.txt
              echo "═════════════════════════════════════════════════════════════════"

              # ========================================
              # Find the LOCAL run directory
              # ========================================
              RUN_DIR=$(find /tmp -maxdepth 1 -name "rf_run_*" -type d | sort | tail -1)
              if [[ -z "$RUN_DIR" ]]; then
                echo "WARNING: No local run directory found — using fallback"
                RUN_DIR="/tmp/rf_run_$(date +%Y%m%d_%H%M%S)"
                mkdir -p "$RUN_DIR/frames"
              fi
              TIMESTAMP=$(basename "$RUN_DIR" | sed 's/rf_run_//')
              echo "Local run directory: $RUN_DIR (timestamp: $TIMESTAMP)"

              # ========================================
              # Stitch last run's PNGs into mp4
              # ========================================
              FRAMES_DIR="$RUN_DIR/frames"
              VIDEO_OUT="$RUN_DIR/output.mp4"
              if [[ -d "$FRAMES_DIR" && -n "$(ls $FRAMES_DIR/frame_*.png 2>/dev/null | head -1)" ]]; then
                FRAME_COUNT=$(ls $FRAMES_DIR/frame_*.png | wc -l)
                echo "Stitching $FRAME_COUNT frames into video: $VIDEO_OUT"
                python3 -c "import imageio,glob,sys; frames=sorted(glob.glob('$FRAMES_DIR/frame_*.png')); w=imageio.get_writer('$VIDEO_OUT',fps=16); [w.append_data(imageio.imread(f)) for f in frames]; w.close(); print(f'Video saved ($VIDEO_OUT), {len(frames)} frames')" 2>&1 || echo "WARNING: video stitch failed (frames still available as PNGs)"
              else
                echo "No frames found in $FRAMES_DIR — skipping video stitch"
              fi

              # ========================================
              # Copy profile artifacts into run directory
              # ========================================
              PROFILE_DEST="$RUN_DIR/profiles"
              mkdir -p "$PROFILE_DEST"
              # Copy native profiler output (NEFF+NTFF pairs, trace.json, .pb files)
              if [[ -d /tmp/neuron_profile && -n "$(ls -A /tmp/neuron_profile 2>/dev/null)" ]]; then
                cp -r /tmp/neuron_profile/* "$PROFILE_DEST/"
                echo "Profile artifacts saved to $PROFILE_DEST"
              fi

              # ========================================
              # ARCHIVE: Copy to S3 persistent storage
              # ========================================
              ARCHIVE_DIR="/var/mdl/rolling_forcing/runs/${JOB_TAG}_${TIMESTAMP}"
              echo ""
              echo "============================================"
              echo "  ARCHIVING to S3: $ARCHIVE_DIR"
              echo "============================================"
              mkdir -p "$ARCHIVE_DIR"
              # e2e_pipeline.py writes one prompt_NNN.mp4 per prompt + tflops_report.json
              # into --output_folder ($RUN_DIR). Persist ALL of them for accuracy review.
              cp "$RUN_DIR"/prompt_*.mp4 "$ARCHIVE_DIR/" 2>/dev/null \
                && echo "archived $(ls "$RUN_DIR"/prompt_*.mp4 2>/dev/null | wc -l) prompt mp4(s)" \
                || echo "no prompt_*.mp4 to archive"
              cp "$RUN_DIR/tflops_report.json" "$ARCHIVE_DIR/" 2>/dev/null || true
              cp /tmp/fps_summary.txt "$ARCHIVE_DIR/" 2>/dev/null || true
              cp /tmp/e2e_run.log "$ARCHIVE_DIR/" 2>/dev/null || true
              echo "Archive complete!"
              ls -la "$ARCHIVE_DIR/" 2>/dev/null || true
          resources:
            claims:
              - name: m-lnc1-trn3
            # Sized for 4 pods/node (64 NeuronCores / 16 per pod = 4). Node has ~191 cpu,
            # ~1957Gi mem, ~1.84Ti ephemeral. Requests kept under node/4 so the scheduler
            # can pack all 4; limits allow bursting. ephemeral-storage set explicitly to
            # avoid disk-pressure eviction (Exit 137) — /tmp holds model tar + NEFF cache.
            requests:
              cpu: 40
              memory: 400Gi
              ephemeral-storage: 120Gi
            limits:
              cpu: 90
              memory: 460Gi
              ephemeral-storage: 200Gi
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: 621547421844-ap-southeast-4-pvc
              mountPath: /var/mdl
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NEURON_RT_LOG_LEVEL
              value: "ERROR"
            - name: NEURON_CC_LOG_LEVEL
              value: "ERROR"
            - name: TORCH_NEURONX_LOG_LEVEL
              value: "ERROR"
            - name: RF_DEVICE_BACKEND
              value: "neuron"
            - name: NEURON_RT_ASYNC_EXEC_MAX_INFLIGHT_REQUESTS
              value: "0"
            - name: NEURON_FALLBACK_ENABLED
              value: "0"
            - name: NEURON_CC_FLAGS
              value: "--model-type=transformer"
            - name: NEURON_RT_DBG_INTRA_RDH_CHANNEL_BUFFER_SIZE
              value: "134217728"
            - name: USE_NKI_KERNELS
              value: "true"
            - name: USE_NEFF_CACHE
              value: "false"
            - name: BENCHMARK_RUNS
              value: "3"
            - name: CONFIG_PATH
              value: "configs/rolling_forcing_dmd_tp4sp4.yaml"
            # latent_w must AGREE with CONFIG_PATH's frame_seq_length / image_or_video_shape:
            #   fs1200 -> latent_w 80 (480x640) | fs1440 -> 96 (480x768) | fs1680 -> 112 (480x896)
            - name: LATENT_W
              value: "80"
            - name: JOB_TAG
              value: "rf-job-fs1200"
            - name: MODEL_PATH
              value: "wan_models/Wan2.1-T2V-1.3B"
            - name: VAE_PATH
              value: "wan_models/Wan2.1-T2V-1.3B/Wan2.1_VAE.pth"
            - name: CHECKPOINT_PATH
              value: "checkpoints/rolling_forcing_dmd.pt"
            - name: DEFAULT_NUM_FRAMES
              value: "21"
            - name: DEFAULT_FPS
              value: "16"
            - name: TP_DEGREE
              value: "4"
            - name: VAE_TP_DEGREE
              value: "1"
            - name: T5_RANK
              value: "2"
            - name: DEVICE
              value: "neuron"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: GITHUB_TOKEN
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
        - name: 621547421844-ap-southeast-4-pvc
          persistentVolumeClaim:
            claimName: 621547421844-ap-southeast-4-pvc
