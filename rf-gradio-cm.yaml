apiVersion: v1
kind: ConfigMap
metadata:
  name: rf-gradio-config
  namespace: default
data:
  rf_gradio_app.py: |
    import gradio as gr
    import requests
    import numpy as np
    import base64
    import io
    import logging
    import sys
    import time
    import json
    from PIL import Image

    logging.basicConfig(
        level=logging.INFO,
        format='%(asctime)s - %(levelname)s - %(message)s',
        stream=sys.stdout
    )
    logger = logging.getLogger(__name__)

    RF_URL = "http://rf.default.svc.cluster.local:8000"

    print("=" * 60)
    print("Rolling Forcing - Video Generation UI")
    print(f"Endpoint: {RF_URL}")
    print("=" * 60)

    def decode_base64_image(base64_str):
        image_data = base64.b64decode(base64_str)
        return Image.open(io.BytesIO(image_data))

    def generate_streaming(prompt, progress=gr.Progress()):
        import os as _os
        num_frames = int(_os.environ.get("DEFAULT_NUM_FRAMES", "126"))
        yield [], None, "Starting...", gr.update(interactive=False)

        logger.info(f"[REQUEST] prompt: '{prompt[:50]}...', frames: {num_frames}")

        if not prompt.strip():
            yield [], None, "Please enter a prompt", gr.update(interactive=True)
            return

        frames = []
        start_time = time.time()

        try:
            response = requests.post(
                f"{RF_URL}/generate/stream",
                json={
                    "prompt": prompt,
                    "num_frames": int(num_frames),
                },
                stream=True,
                timeout=18000
            )

            if response.status_code == 429:
                yield [], None, "All models are busy. Please wait and try again.", gr.update(interactive=True)
                return

            response.raise_for_status()

            for line in response.iter_lines():
                if line:
                    line_str = line.decode('utf-8')
                    if line_str.startswith('data: '):
                        data = json.loads(line_str[6:])

                        if 'error' in data:
                            elapsed = time.time() - start_time
                            yield frames, None, f"Error: {data['error']} ({elapsed:.1f}s)", gr.update(interactive=True)
                            return

                        if 'done' in data:
                            break

                        if 'frame' in data:
                            frame = decode_base64_image(data['frame'])
                            frames.append(frame)
                            idx = data['frame_index']
                            total = data['total_frames']
                            elapsed = time.time() - start_time
                            yield frames, None, f"Frame {idx + 1}/{total} ({elapsed:.1f}s)", gr.update(interactive=False)

            elapsed = time.time() - start_time
            fps = len(frames) / elapsed if elapsed > 0 else 0

            video_path = None
            if frames:
                import tempfile
                import imageio
                frames_np = [np.array(f) for f in frames]
                with tempfile.NamedTemporaryFile(suffix='.mp4', delete=False) as f:
                    video_path = f.name
                writer = imageio.get_writer(
                    video_path, fps=16, codec='libx264',
                    output_params=['-profile:v', 'baseline', '-pix_fmt', 'yuv420p']
                )
                for frame_np in frames_np:
                    writer.append_data(frame_np)
                writer.close()

            yield frames, video_path, f"Done: {len(frames)} frames in {elapsed:.1f}s ({fps:.2f} fps)", gr.update(interactive=True)

        except Exception as e:
            elapsed = time.time() - start_time
            logger.error(f"Error: {str(e)}")
            yield frames, None, f"Error: {str(e)} ({elapsed:.1f}s)", gr.update(interactive=True)

    with gr.Blocks(title="Rolling Forcing - Video Generation") as demo:
        gr.Markdown("""
        # Rolling Forcing - Video Generation

        Generate videos from text prompts using **Rolling Forcing** on AWS Trainium.
        DiT TP4xCP4, TP16 VAE and T5.
        Frames stream in real-time as they are generated.
        """)

        with gr.Tabs():
          with gr.Tab("Generate"):
            with gr.Row():
              with gr.Column(scale=3):
                prompt_input = gr.Textbox(
                    label="Prompt",
                    placeholder="A cat walking on the beach at sunset...",
                    lines=2,
                )
              with gr.Column(scale=1):
                pass

            stream_btn = gr.Button("Generate Streaming", variant="primary", size="lg")

            gallery = gr.Gallery(
                label="Generated Frames",
                columns=5,
                rows=3,
                object_fit="contain",
                height=400,
            )
            video_output = gr.Video(label="Generated Video", height=350)
            status_output = gr.Textbox(label="Status", interactive=False)

            stream_btn.click(
                fn=generate_streaming,
                inputs=[prompt_input],
                outputs=[gallery, video_output, status_output, stream_btn],
            )

            EXAMPLE_PROMPTS = [
                ("Cowboy in desert", "A cinematic scene from a classic western movie, featuring a rugged man riding a powerful horse through the vast Gobi Desert at sunset. The man, dressed in a dusty cowboy hat and a worn leather jacket, reins tightly on the horse's neck as he gallops across the golden sands. The sun sets dramatically behind them, casting long shadows and warm hues across the landscape. The background is filled with rolling dunes and sparse, rocky outcrops, emphasizing the harsh beauty of the desert. A dynamic wide shot from a low angle, capturing both the man and the expansive desert vista."),
                ("Piano player", "A classic black-and-white photograph style image of an older man playing the piano. The man, with a weathered face and kind eyes, sits at an antique piano with his fingers gracefully moving over the keys. The lighting comes from the side, casting dramatic shadows on his face and emphasizing the texture of his hands. His posture is upright and focused, conveying a sense of deep concentration and passion for music. The background is blurred, revealing only hints of a cozy room with wooden floors and old furniture. A close-up shot from a slightly elevated angle, capturing both the man and the piano in detail."),
                ("Dancing skeleton", "A dramatic post-apocalyptic scene in the style of a horror film, featuring a skeleton wearing a colorful flower hat and oversized sunglasses dancing wildly in a sunlit meadow at sunset. The skeleton has a weathered and somewhat decayed appearance, with bones visible through tattered remnants of clothing. The dance is energetic and almost comical, with exaggerated movements. The background is a vivid blend of warm oranges and pinks, with tall grasses and wildflowers swaying in the breeze. The sky is painted with rich hues of orange and pink, casting long shadows across the landscape. A dynamic medium shot from a low angle, capturing the skeleton's animated dance."),
                ("Kangaroo boxing", "A dynamic action scene in a modern gym, featuring a kangaroo wearing boxing gloves, engaged in an intense sparring session with a punching bag. The kangaroo has a muscular build and is positioned mid-punch, its front legs wrapped in red boxing gloves, eyes focused intently on the target. The background showcases a cluttered gym with heavy equipment and mats, creating a vivid and realistic setting. The kangaroo's movements are fluid and powerful, conveying both agility and strength. The scene captures a split-second moment of mid-action, with the kangaroo's tail swaying behind it. A high-angle shot emphasizing the kangaroo's dynamic pose and the surrounding gym environment."),
                ("Dog chasing car", "A dynamic action shot in the style of a high-energy sports magazine spread, featuring a golden retriever sprinting with all its might after a red sports car speeding down the road. The dog's fur glistens in the sunlight, and its eyes are filled with determination and excitement. It leaps forward, its tail wagging wildly, while the car speeds away in the background, leaving a trail of dust. The background shows a busy city street with blurred cars and pedestrians, adding to the sense of urgency. The photo has a crisp, vibrant color palette and a high-resolution quality. A medium-long shot capturing the dog's full run."),
                ("Longboarder downhill", "A dynamic action shot in the style of a professional skateboard magazine, featuring a young male longboarder accelerating downhill. He is fully focused, his expression intense and determined, carving through tight turns with precision. His longboard glides smoothly over the pavement, creating a blur of motion. He wears a black longboard shirt, blue jeans, and white sneakers, with a backpack slung over one shoulder. His hair flows behind him as he moves, and he grips the board tightly with both hands. The background shows a scenic urban street with blurred buildings and trees, hinting at a lively cityscape. The photo captures the moment just after he exits a turn, with a slight bounce in the board and a sense of speed and agility. A medium shot with a slightly elevated camera angle."),
                ("Hip-hop dancer", "A dynamic hip-hop dance scene in a vibrant urban style, featuring an Asian girl in a bright yellow T-shirt and white pants. She is mid-dance move, arms stretched out and feet rhythmically stepping, exuding energy and confidence. Her hair is tied up in a ponytail, and she has a mischievous smile on her face. The background shows a bustling city street with blurred reflections of tall buildings and passing cars. The scene captures the lively and energetic atmosphere of a hip-hop performance, with a slightly grainy texture. A medium shot from a low-angle perspective."),
                ("Skateboarder tricks", "A dynamic tracking shot following a skateboarder performing a series of fluid tricks down a bustling city street. The skateboarder, wearing a black helmet and a colorful shirt, moves with grace and confidence, executing flips, grinds, and spins. The camera captures the skateboarder's fluid movements, capturing the essence of each trick with precision. The background showcases the urban environment, with tall buildings, busy traffic, and passersby in the distance. The lighting highlights the skateboarder's movements, creating a sense of speed and energy. The overall style is reminiscent of a skateboarding documentary, emphasizing the natural and dynamic nature of the tricks."),
                ("Dog in park", "A handheld camera captures a dog running through a park with a joyful exploration, the camera following the dog closely and bouncing and tilting with its movements. The dog bounds through the grass, tail wagging excitedly, sniffing at flowers and chasing after butterflies. Its fur glistens in the sunlight, and its eyes sparkle with enthusiasm. The park is filled with trees and colorful blooms, and the background shows a blurred path leading into the distance. The camera angle changes dynamically, providing a sense of the dog's lively energy and the vibrant environment around it."),
                ("Child in field", "A handheld shot following a young child running through a field of tall grass, capturing the spontaneity and playfulness of their movements. The child has curly brown hair and a mischievous smile, arms swinging freely as they sprint across the green expanse. Their small feet kick up bits of grass and dirt, creating a trail behind them. The background features a blurred landscape with rolling hills and scattered wildflowers, bathed in warm sunlight. The photo has a natural, documentary-style quality, emphasizing the dynamic motion and joy of the moment. A dynamic handheld shot from a slightly elevated angle, following the child's energetic run."),
                ("Cheetah chase", "A high-speed action shot of a cheetah in its natural habitat, sprinting at full speed while chasing its prey across the savanna. The cheetah's golden fur glistens under the bright African sun, and its muscular body is stretched out in a powerful run. Its sharp eyes focus intently on the fleeing antelope, and its distinctive black tear marks streak down its face. The background is a blurred landscape with tall grass swaying in the wind, and distant acacia trees. The cheetah's tail is raised high, and its paws leave deep prints in the soft earth. A dynamic mid-shot capturing the intense moment of pursuit."),
                ("Smiling woman", "A photograph in a soft, warm lighting style, capturing a young woman with a bright smile and a playful wink. She has long curly brown hair and warm hazel eyes, with a slightly flushed cheeks from laughter. She is dressed in a casual yet stylish outfit: a floral printed sundress with a flowy skirt and a fitted top. Her hands are on her hips, giving a casual pose. The background features a blurred outdoor garden setting with blooming flowers and greenery. A medium shot from a slightly above-the-shoulder angle, emphasizing her joyful expression and the natural movement of her face."),
                ("Emotional goodbye", "A poignant moment captured in a realistic photographic style, showing a middle-aged man with a rugged face and slightly tousled hair, his chin quivering with emotion as he says a heartfelt goodbye to a loved one. He wears a simple grey sweater and jeans, standing on a dewy grassy field under a clear blue sky, with fluffy white clouds in the background. The camera angle is slightly from below, emphasizing his sorrowful expression and the depth of his feelings. A medium shot with a soft focus on the man's face and a blurred background."),
                ("Llama dancing", "A realistic photo of a llama wearing colorful pajamas dancing energetically on a stage under vibrant disco lighting. The llama has large floppy ears and a playful expression, moving its legs in a lively dance. It wears a red and yellow striped pajama top and matching pajama pants, with a fluffy tail swaying behind it. The stage is adorned with glittering disco balls and colorful lights, casting a lively and joyful atmosphere. The background features blurred audience members and a backdrop with disco-themed decorations. A dynamic shot capturing the llama mid-dance from a slightly elevated angle."),
                ("Kangaroo in Mumbai", "An adorable kangaroo, dressed in a cute green dress with polka dots, is wearing a small sun hat perched on its head. The kangaroo takes a pleasant stroll through the bustling streets of Mumbai during a vibrant and colorful festival. The background is filled with lively festival-goers in traditional Indian attire, adorned with intricate henna designs and bright jewelry. The scene is filled with colorful decorations, vendors selling various items, and people dancing and singing. The kangaroo moves gracefully, hopping along the cobblestone streets, its tail swinging behind it. The camera angle captures the kangaroo from a slight overhead perspective, highlighting its joyful expression and the festive atmosphere. A medium shot with dynamic movement."),
                ("Lone tree at dawn", "An atmospheric and dramatic arc shot around a lone tree standing in a vast, foggy field at dawn. The early morning light filters through the mist, casting a soft, warm glow on the tree and the surrounding landscape. The tree's branches stretch out against the backdrop of a gradually lightening sky, with the shadows shifting and changing as the sun rises. The field is dotted with tall grasses and scattered wildflowers, their silhouettes softened by the fog. The overall scene has a moody, ethereal quality, emphasizing the natural movement of the fog and the subtle changes in light and shadow. A dynamic arc shot capturing the transition from night to day."),
            ]

            gr.Markdown("### Example Prompts (click to load)")
            for row_start in range(0, len(EXAMPLE_PROMPTS), 4):
                with gr.Row(equal_height=True):
                    for label, full_prompt in EXAMPLE_PROMPTS[row_start:row_start+4]:
                        btn = gr.Button(f"{label}", size="sm", variant="secondary")
                        btn.click(fn=lambda p=full_prompt: p, inputs=[], outputs=[prompt_input])

            with gr.Accordion("About", open=False):
                gr.Markdown("""
                ## How it works

                - **Model**: WAN2.1-T2V-1.3B with Rolling Forcing DMD distillation
                - **Hardware**: AWS Trainium (16 NeuronCores, LNC=1)
                - **Parallelism**: DiT TP4xCP4, TP16 VAE and T5
                - **Streaming**: Frames delivered via Server-Sent Events as blocks complete
                - **Resolution**: 480x640 pixels
                - **Code path**: e2e_pipeline (proper collectives, no file-based exchange)
                """)

    print("Starting server on port 8000...")
    demo.queue(default_concurrency_limit=10)
    demo.launch(server_name="0.0.0.0", server_port=8000, root_path="/rf")

