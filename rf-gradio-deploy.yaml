apiVersion: v1
kind: Service
metadata:
  name: rf-gradio
  namespace: default
spec:
  selector:
    app: rf-gradio
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rf-gradio
  namespace: default
  labels:
    app: rf-gradio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rf-gradio
  template:
    metadata:
      labels:
        app: rf-gradio
    spec:
      nodeSelector:
        node-type: m5
      containers:
        - name: app
          image: python:3.11-slim
          imagePullPolicy: Always
          workingDir: /app
          command:
            - /bin/sh
            - -c
            - |
              set -ex
              pip install gradio requests numpy pillow imageio imageio-ffmpeg
              echo "Dependencies installed, starting app..."
              python -u rf_gradio_app.py
          volumeMounts:
            - name: rf-gradio-volume
              mountPath: /app/rf_gradio_app.py
              subPath: rf_gradio_app.py
          env:
            - name: DEFAULT_NUM_FRAMES
              value: "21"
          ports:
            - containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi
      volumes:
        - name: rf-gradio-volume
          configMap:
            name: rf-gradio-config
            items:
              - key: rf_gradio_app.py
                path: rf_gradio_app.py
